# mbs4-calibre and mbs4-e2e-tests are excluded from mutation generation:
# - mbs4-calibre tests require Calibre CLI tools which are not always installed
# - mbs4-e2e-tests contains only integration test code, not application logic
exclude_globs = [
    "crates/mbs4-calibre/**/*.rs",
    "crates/mbs4-e2e-tests/**/*.rs"
]

# Run the full workspace test suite for every mutant so that e2e tests in
# mbs4-e2e-tests also exercise mutations in mbs4-app and other crates.
# Without this, cargo-mutants only runs the mutated crate's own unit tests,
# which misses all server-level behaviour tested by the integration tests.
test_workspace = true
